<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Song Creator — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes blob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -50px) scale(1.1); }
            66%       { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-12px); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .blob { animation: blob 7s infinite ease-in-out; }
        .blob-delay-2 { animation-delay: 2s; }
        .blob-delay-4 { animation-delay: 4s; }
        .float { animation: float 3s ease-in-out infinite; }
        .fade-in-up { animation: fadeInUp 0.6s ease both; }
        .glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body class="min-h-screen bg-[#060612] flex items-center justify-center overflow-hidden relative">

    <!-- Animated background blobs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="blob absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-700/30 blur-[80px]"></div>
        <div class="blob blob-delay-2 absolute top-[20%] right-[-10%] w-[400px] h-[400px] rounded-full bg-indigo-600/25 blur-[80px]"></div>
        <div class="blob blob-delay-4 absolute bottom-[-10%] left-[30%] w-[450px] h-[450px] rounded-full bg-pink-700/20 blur-[80px]"></div>
    </div>

    <!-- Card -->
    <div class="relative z-10 w-full max-w-md mx-4 fade-in-up">
        <div class="glass rounded-3xl p-10 space-y-8 shadow-2xl">

            <!-- Logo -->
            <div class="text-center space-y-3">
                <div class="float inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-purple-600 to-pink-600 shadow-lg shadow-purple-500/30 mx-auto">
                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight">AI Song Creator</h1>
                    <p class="text-slate-400 mt-1 text-sm">Turn your moments into music with AI</p>
                </div>
            </div>

            <!-- Sign in section -->
            <div class="space-y-4">
                <p class="text-center text-slate-500 text-xs uppercase tracking-widest font-semibold">Sign in to continue</p>

                <!-- Google sign-in button (redirect-based, no JS library needed) -->
                <a
                    href="/auth/google/"
                    class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-800 font-semibold py-3.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-200"
                >
                    <!-- Google logo -->
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </a>

                <!-- Divider -->
                <div class="flex items-center gap-3">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-slate-600 text-xs">or</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <!-- Demo login form -->
                <form action="/auth/demo/" method="post" class="space-y-3">
                    {% csrf_token %}
                    <input type="text" name="name" placeholder="Your name" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500/50 transition text-sm"/>
                    <input type="email" name="email" placeholder="your@email.com" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500/50 transition text-sm"/>
                    <button type="submit"
                        class="w-full bg-white/10 hover:bg-white/15 border border-white/10 text-white font-semibold py-3 rounded-xl transition text-sm">
                        Continue with Email
                    </button>
                </form>

                <p class="text-center text-slate-600 text-xs">
                    By signing in, you agree to our Terms of Service
                </p>
            </div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">
            Powered by Suno AI &middot; Built for music lovers
        </p>
    </div>
</body>
</html>
